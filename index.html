<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forma — Everyday Objects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --ink-soft: #6b6b67;
      --ink-faint: #a8a8a3;
      --surface: #faf9f7;
      --surface-alt: #f2f0ec;
      --border: #e4e2dc;
      --accent: #3a5a3c;
      --accent-light: #edf3ed;
      --white: #ffffff;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.05);
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-filters {
      display: flex;
      gap: 0.5rem;
    }

    .filter-btn {
      font-family: inherit;
      font-size: 0.8rem;
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .cart-btn {
      position: relative;
      background: var(--ink);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 18px;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cart-btn:hover { background: var(--accent); }

    .cart-count {
      background: #e05a30;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* HERO */
    .hero {
      padding: 5rem 2rem 4rem;
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-eyebrow {
      font-family: 'Georgia', serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto;
    }

    /* GRID */
    .products-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 5rem;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 400;
      color: var(--ink-soft);
    }

    #result-count {
      font-size: 0.85rem;
      color: var(--ink-faint);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface-alt);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.04);
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 99px;
    }

    .badge-bestseller { background: #fff8e1; color: #8a6200; }
    .badge-new { background: var(--accent-light); color: var(--accent); }
    .badge-sale { background: #fdecea; color: #a32d2d; }

    .card-body {
      padding: 1rem 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-category {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.35rem;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--ink-soft);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
    }

    .add-btn {
      font-family: inherit;
      font-size: 0.82rem;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-alt);
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }

    .add-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .add-btn.added {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--ink-faint);
      display: none;
    }

    .empty-state svg { margin-bottom: 1rem; opacity: 0.3; }

    /* CART DRAWER */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
    }

    .cart-overlay.open { display: block; }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 380px;
      max-width: 95vw;
      background: var(--white);
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cart-drawer.open { transform: translateX(0); }

    .cart-drawer-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-drawer-header h3 {
      font-size: 1rem;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--ink-soft);
      line-height: 1;
      padding: 4px;
    }

    .close-btn:hover { color: var(--ink); }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .cart-item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--surface-alt);
    }

    .cart-item-info { flex: 1; }

    .cart-item-name {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .cart-item-price {
      font-size: 0.82rem;
      color: var(--ink-soft);
    }

    .remove-item {
      background: none;
      border: none;
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
    }

    .remove-item:hover { color: #a32d2d; }

    .cart-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .checkout-btn {
      width: 100%;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    .checkout-btn:hover { background: var(--accent); }

    .cart-empty-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink-faint);
      font-size: 0.9rem;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 300;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      color: var(--ink-faint);
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .nav-filters { display: none; }
      .hero { padding: 3rem 1rem 2rem; }
      .products-section { padding: 1rem 1rem 3rem; }
      .product-grid { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .card-desc { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">For<span>ma</span></a>
  <div class="nav-right">
    <div class="nav-filters">
      <button class="filter-btn active" data-cat="All">All</button>
      <button class="filter-btn" data-cat="Bags">Bags</button>
      <button class="filter-btn" data-cat="Kitchen">Kitchen</button>
      <button class="filter-btn" data-cat="Home">Home</button>
      <button class="filter-btn" data-cat="Accessories">Accessories</button>
    </div>
    <button class="cart-btn" id="cart-toggle">
      🛒 Cart
      <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <p class="hero-eyebrow">Thoughtfully made</p>
  <h1>Objects worth keeping</h1>
  <p>Simple things, made well. No logos, no clutter — just honest design for daily life.</p>
</div>

<!-- PRODUCTS -->
<section class="products-section">
  <div class="section-header">
    <h2>Shop all</h2>
    <span id="result-count"></span>
  </div>
  <div class="product-grid" id="product-grid"></div>
  <div class="empty-state" id="empty-state">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <p>No products in this category.</p>
  </div>
</section>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <h3>Your cart</h3>
    <button class="close-btn" id="close-cart">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total">$0</span>
    </div>
    <button class="checkout-btn">Proceed to checkout →</button>
  </div>
</aside>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<footer>© 2025 Forma · All rights reserved · Built with care</footer>

<script>
  // ─── DATA LAYER ───────────────────────────────────────────────
  // In production this fetches from your API (json-server or Supabase).
  // Here we use the inline DB so the file works standalone too.
  const DB_URL = './db.json'; // Change to your deployed API URL

  let products = [];
  let cart = [];
  let activeCategory = 'All';

  async function loadProducts() {
    try {
      const res = await fetch(DB_URL);
      const data = await res.json();
      products = data.products;
    } catch {
      // Fallback: embedded data if fetch fails (e.g. opened as local file)
      products = [
        { id:1, name:"Minimal Canvas Tote", price:38, category:"Bags", description:"Heavy-duty natural canvas with a clean, uncluttered design.", image:"https://images.unsplash.com/photo-1622560480605-d83c853bc5c3?w=600&q=80", badge:"Bestseller", stock:12 },
        { id:2, name:"Ceramic Pour-Over Set", price:64, category:"Kitchen", description:"Hand-thrown stoneware dripper and carafe. Slow mornings made beautiful.", image:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80", badge:"New", stock:5 },
        { id:3, name:"Linen Throw Blanket", price:89, category:"Home", description:"Stone-washed Portuguese linen. Gets softer with every wash.", image:"https://images.unsplash.com/photo-1580301762395-21ce84d00bc6?w=600&q=80", badge:"", stock:20 },
        { id:4, name:"Leather Card Wallet", price:45, category:"Accessories", description:"Full-grain vegetable-tanned leather. Holds 6 cards.", image:"https://images.unsplash.com/photo-1627123424574-724758594e93?w=600&q=80", badge:"", stock:30 },
        { id:5, name:"Bamboo Desk Organizer", price:52, category:"Home", description:"Modular bamboo tray system — keeps your desk clear without looking sterile.", image:"https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=600&q=80", badge:"Sale", stock:8 },
        { id:6, name:"Glass Water Bottle", price:28, category:"Kitchen", description:"Borosilicate glass with a silicone sleeve. No plastic taste.", image:"https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=600&q=80", badge:"", stock:25 }
      ];
    }
    renderProducts();
  }

  // ─── RENDER ───────────────────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById('product-grid');
    const empty = document.getElementById('empty-state');
    const count = document.getElementById('result-count');

    const filtered = activeCategory === 'All'
      ? products
      : products.filter(p => p.category === activeCategory);

    count.textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    grid.innerHTML = filtered.map(p => {
      const badgeClass = p.badge ? `badge badge-${p.badge.toLowerCase()}` : '';
      const inCart = cart.some(c => c.id === p.id);
      return `
        <article class="card">
          <div class="card-img-wrap">
            <img src="${p.image}" alt="${p.name}" loading="lazy" />
            ${p.badge ? `<span class="${badgeClass}">${p.badge}</span>` : ''}
          </div>
          <div class="card-body">
            <p class="card-category">${p.category}</p>
            <h3 class="card-name">${p.name}</h3>
            <p class="card-desc">${p.description}</p>
            <div class="card-footer">
              <span class="card-price">$${p.price}</span>
              <button class="add-btn ${inCart ? 'added' : ''}" data-id="${p.id}">
                ${inCart ? '✓ Added' : 'Add to cart'}
              </button>
            </div>
          </div>
        </article>
      `;
    }).join('');

    grid.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => addToCart(parseInt(btn.dataset.id)));
    });
  }

  // ─── CART ─────────────────────────────────────────────────────
  function addToCart(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;
    if (!cart.some(c => c.id === id)) {
      cart.push({ ...product, qty: 1 });
    }
    updateCart();
    showToast(`${product.name} added to cart`);
    renderProducts();
  }

  function removeFromCart(id) {
    cart = cart.filter(c => c.id !== id);
    updateCart();
    renderCartDrawer();
    renderProducts();
  }

  function updateCart() {
    document.getElementById('cart-count').textContent = cart.length;
    renderCartDrawer();
  }

  function renderCartDrawer() {
    const container = document.getElementById('cart-items');
    const footer = document.getElementById('cart-footer');
    const total = document.getElementById('cart-total');

    if (cart.length === 0) {
      container.innerHTML = '<p class="cart-empty-msg">Your cart is empty.</p>';
      footer.style.display = 'none';
      return;
    }

    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}" />
        <div class="cart-item-info">
          <p class="cart-item-name">${item.name}</p>
          <p class="cart-item-price">$${item.price}</p>
        </div>
        <button class="remove-item" data-id="${item.id}">✕</button>
      </div>
    `).join('');

    container.querySelectorAll('.remove-item').forEach(btn => {
      btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
    });

    const sum = cart.reduce((acc, i) => acc + i.price, 0);
    total.textContent = `$${sum}`;
    footer.style.display = 'block';
  }

  // ─── TOAST ────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ─── EVENTS ───────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      renderProducts();
    });
  });

  document.getElementById('cart-toggle').addEventListener('click', () => {
    document.getElementById('cart-drawer').classList.add('open');
    document.getElementById('cart-overlay').classList.add('open');
  });

  function closeCart() {
    document.getElementById('cart-drawer').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('open');
  }

  document.getElementById('close-cart').addEventListener('click', closeCart);
  document.getElementById('cart-overlay').addEventListener('click', closeCart);

  // ─── INIT ─────────────────────────────────────────────────────
  loadProducts();
</script>
</body>
</html>
